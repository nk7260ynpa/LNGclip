services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lngclip
      POSTGRES_PASSWORD: lngclip
      POSTGRES_DB: lngclip
    ports:
      - "5433:5432"
    volumes:
      - ../database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lngclip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://lngclip:lngclip@postgres:5432/lngclip
      SYNC_SCHEDULE_HOUR: "6"
      SYNC_SCHEDULE_MINUTE: "0"
    volumes:
      - ../logs:/app/logs
      - ../images:/app/images
    depends_on:
      postgres:
        condition: service_healthy

  crawler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.crawler
    environment:
      DATABASE_URL: postgresql://lngclip:lngclip@postgres:5432/lngclip
    volumes:
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - backend

